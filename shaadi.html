<!doctype html>
<html>
  <head>
    <title>Shaadi.com Profile Form</title>
  </head>

  <body>
    <center>
      <h1>💍Shaadi.com Profile Registration💍</h1>
      <h2><em>❤️Connecting Souls, Creating Beautiful Stories🌸</em></h2>
    </center>

    <hr/>

    <form>
      <h3>👤Personal Details</h3>

      <label>Full Name:</label><br/>
      <input type="text" placeholder="Enter your full name"/><br/><br/>

      <label>Email:</label><br/>
      <input type="email" placeholder="Enter your email" /><br/><br/>

      <label>Password:</label><br/>
      <input type="password" placeholder="Create a password"/><br/><br/>

      <label>Date of Birth:</label><br/>
      <input type="date" /><br/><br/>

      <label>Age:</label><br/>
      <input type="number" min="18" max="100" /><br/><br/>

      <label>Phone Number:</label><br/>
      <input type="tel" placeholder="Enter your phone number"/><br/><br/>

      <hr/>

      <h3>Gender</h3>

      <input type="radio" name="gender"/> Male<br/>
      <input type="radio" name="gender"/> Female<br/>
      <input type="radio" name="gender"/> Other<br/><br/>

      <hr/>

      <h3>Address Details</h3>

      <label>City:</label><br/>
      <input type="text" placeholder="Enter your city"/><br/><br/>

      <label>State:</label><br/>
      <input type="text" placeholder="Enter your state"/><br/><br/>

      <label>Country:</label><br/>
      <input type="text" placeholder="Enter your country"/><br/><br/>

      <label>Address:</label><br/>
      <textarea rows="4" cols="40" placeholder="Enter your address"></textarea
      ><br/><br/>

      <hr/>

      <h3>Education</h3>

      <select>
        <option>Select Qualification</option>
        <option>High School</option>
        <option>Bachelor's Degree</option>
        <option>Master's Degree</option>
        <option>PhD</option>
      </select>

      <br/><br/>

      <label>Profession:</label><br/>
      <input type="text" placeholder="Enter your profession" /><br/><br/>

      <label>Annual Income:</label><br/>
      <input type="number" placeholder="Enter your annual income"/><br/><br/>

      <hr/>

      <h3>Marital Status</h3>

      <input type="radio" id="single" name="status"/>
      <label for="single">Single</label><br/>

      <input type="radio" id="divorced" name="status"/>
      <label for="divorced">Divorced</label><br/>

      <input type="radio" id="widowed" name="status"/>
      <label for="widowed">Widowed</label><br/><br/>

      <hr/>

      <h3>Hobbies</h3>

      <input type="checkbox" id="reading"/>
      <label for="reading">Reading</label><br/>

      <input type="checkbox" id="traveling"/>
      <label for="traveling">Traveling</label><br/>

      <input type="checkbox" id="music"/>
      <label for="music">Music</label><br/>

      <input type="checkbox" id="cooking"/>
      <label for="cooking">Cooking</label><br/>

      <input type="checkbox" id="dancing"/>
      <label for="dancing">Dancing</label><br/><br/>

      <hr/>

      <h3>Languages Known</h3>

      <input type="checkbox" id="english"/>
      <label for="english">English</label><br/>

      <input type="checkbox" id="hindi"/>
      <label for="hindi">Hindi</label><br/>

      <input type="checkbox" id="marathi"/>
      <label for="marathi">Marathi</label><br/>

      <input type="checkbox" id="gujarati"/>
      <label for="gujarati">Gujarati</label><br/><br/>

      <hr/>

      <h3>📸Upload Profile Picture</h3>

      <input type="file"/><br/><br/>

      <h3>About Yourself</h3>

      <textarea
        rows="5"
        cols="50"
        placeholder="Tell us about yourself..."
      ></textarea>

      <br/><br/>

      <input type="submit" value="❤️Create Profile"/>
      <input type="reset" value="🔄Reset Form"/>
    </form>
  </body>
</html>
