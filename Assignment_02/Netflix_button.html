<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Button</title>

<style>
    body{
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f5f5f5;
    }
    
    .netflix-btn{
        background: rgb(240, 0, 0);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .netflix-btn:hover{
        background: darkred;
        transform: scale(1.05);
    }
</style>
</head>
<body>

<button class="netflix-btn">Get Started</button>

</body>
</html>
